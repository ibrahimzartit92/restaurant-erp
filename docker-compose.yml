services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurant_erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-restaurant_erp}
      POSTGRES_USER: ${POSTGRES_USER:-restaurant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-restaurant_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-restaurant_user} -d ${POSTGRES_DB:-restaurant_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: restaurant_erp_api
    restart: unless-stopped
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-restaurant_user}:${POSTGRES_PASSWORD:-restaurant_password}@postgres:5432/${POSTGRES_DB:-restaurant_erp}
      NODE_ENV: development
      PORT: 3001
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./packages:/workspace/packages
      - /workspace/node_modules
      - /workspace/apps/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: restaurant_erp_web
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-3001}
      INTERNAL_API_URL: http://api:3001
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/workspace/apps/web
      - ./packages:/workspace/packages
      - /workspace/node_modules
      - /workspace/apps/web/node_modules
    depends_on:
      - api

  nginx:
    image: nginx:1.27-alpine
    container_name: restaurant_erp_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  postgres-data:
